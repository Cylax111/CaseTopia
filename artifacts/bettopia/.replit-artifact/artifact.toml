kind = "web"
previewPath = "/"
title = "BetTopia"
version = "1.0.0"
id = "artifacts/bettopia"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23708

[services.development]
run = "pnpm --filter @workspace/bettopia run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bettopia", "run", "build" ]
publicDir = "artifacts/bettopia/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23708"
BASE_PATH = "/"
